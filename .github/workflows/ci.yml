name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  # Weekly so a newly published RustSec advisory is caught on an unchanged
  # default branch, not only when repository activity happens to occur.
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  rust:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --all-targets
      - name: Test Ishikari without simulator support
        run: cargo test -p ishikari --all-targets --no-default-features

  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Audit Rust dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
