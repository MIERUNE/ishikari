apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ishikari-internal-boundary
spec:
  podSelector:
    matchLabels:
      app: ishikari
  policyTypes:
    - Ingress
  ingress:
    # Public HTTP remains reachable from the Gateway, kubelet probes, and
    # explicitly exposed in-cluster clients.
    - ports:
        - port: 8080
          protocol: TCP
    # Peer HTTP and gossip are reachable only from Ishikari pods in this
    # namespace. Internal routes deliberately have no public Service.
    - from:
        - podSelector:
            matchLabels:
              app: ishikari
      ports:
        - port: 9090
          protocol: TCP
        - port: 7946
          protocol: UDP
