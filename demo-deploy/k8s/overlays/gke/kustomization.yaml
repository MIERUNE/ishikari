apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: map-demo

resources:
  - healthcheck.yaml
  - httproute.yaml
  - networkpolicy-monitoring.yaml
  - podmonitoring.yaml
  - hpa.yaml
  - ../../base

images:
  - name: ishikari
    newName: asia-northeast1-docker.pkg.dev/mappf-experiment/ishikari/ishikari
    digest: sha256:681028596380642fe6cea402214c100395fda6df91790e90a008aea66220857a

patches:
  - path: patch-serviceaccount.yaml
  - path: patch-deployment.yaml
  # The HPA owns replica count; drop the base Deployment's fixed replicas so
  # `kubectl apply` doesn't reset the autoscaler's decision on every deploy.
  - target:
      kind: Deployment
      name: ishikari
    patch: |-
      - op: remove
        path: /spec/replicas
